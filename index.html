<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
	<title>Lunaris</title>

	<link rel="shortcut icon" content="favicon.jpg" />

	<script src="/scram/scramjet.all.js"></script>
	<script src="/baremux/index.js"></script>

	<link rel="stylesheet" href="index.css" />

	<style>
		:root {
			--bg-color: #1e1e24;
			--surface-color: #2b2b36;
			--surface-hover: #3e3e4d;
			--border-color: #3f3f4e;
			--text-main: #e2e8f0;
			--text-muted: #94a3b8;
			--accent-blue: #3b82f6;
			--accent-pastel: #a5b4fc;
		}

		body {
			margin: 0;
			padding: 0;
			background-color: var(--bg-color);
			color: var(--text-main);
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			overflow: hidden;
		}

		/* Clean SVG Icons */
		.icon {
			width: 18px;
			height: 18px;
			stroke: var(--text-muted);
			stroke-width: 2;
			fill: none;
			stroke-linecap: round;
			stroke-linejoin: round;
			cursor: pointer;
			transition: stroke 0.2s ease, background-color 0.2s ease;
			padding: 8px;
			border-radius: 6px;
		}

		.icon:hover {
			stroke: var(--text-main);
			background-color: var(--surface-hover);
		}

		/* Top Bar Styles */
		.top-bar {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 52px;
			background-color: var(--bg-color);
			display: flex;
			align-items: center;
			padding: 0 12px;
			box-sizing: border-box;
			border-bottom: 1px solid var(--border-color);
			z-index: 1000;
		}

		.nav-icons,
		.right-icons {
			display: flex;
			gap: 4px;
			align-items: center;
		}

		#top-form {
			flex-grow: 1;
			max-width: 800px;
			margin: 0 20px;
			position: relative;
			display: flex;
			align-items: center;
		}

		.search-icon-inside {
			position: absolute;
			left: 14px;
			width: 14px;
			height: 14px;
			stroke: var(--text-muted);
			stroke-width: 2;
			fill: none;
			pointer-events: none;
		}

		#top-address {
			width: 100%;
			padding: 8px 16px 8px 36px;
			background-color: var(--surface-color);
			border: 1px solid transparent;
			border-radius: 8px;
			/* Matches bottom styling */
			color: var(--text-main);
			font-size: 14px;
			outline: none;
			transition: border-color 0.2s, background-color 0.2s;
		}

		#top-address:focus {
			background-color: var(--bg-color);
			border-color: var(--accent-blue);
		}

		#top-address::placeholder {
			color: var(--text-muted);
		}

		/* Center Content Styles */
		.center {
			text-align: center;
			display: flex;
			flex-direction: column;
			align-items: center;
			margin-top: 20px;
		}

		h1 {
			font-size: 32px;
			font-weight: 700;
			color: var(--accent-pastel);
			/* Pastel text look */
			margin: 0 0 8px 0;
			letter-spacing: 0.5px;
		}

		.subtitle {
			font-size: 15px;
			color: var(--text-muted);
			margin: 0 0 24px 0;
		}

		#sj-form {
			width: 100%;
			position: relative;
		}

		#sj-address {
			width: 500px;
			max-width: 90vw;
			padding: 12px 20px;
			background-color: var(--surface-color);
			border: 1px solid var(--accent-blue);
			border-radius: 8px;
			color: var(--text-main);
			font-size: 15px;
			text-align: center;
			outline: none;
			transition: box-shadow 0.2s ease-in-out, background-color 0.2s;
		}

		#sj-address::placeholder {
			color: var(--text-muted);
		}

		#sj-address:focus {
			background-color: var(--bg-color);
			box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
		}

		.desc {
			margin-top: 20px;
			text-align: center;
			color: #ef4444;
		}

		.footer {
			position: absolute;
			bottom: 24px;
			font-size: 13px;
			display: flex;
			gap: 20px;
		}

		.footer a {
			color: var(--text-muted);
			text-decoration: none;
			transition: color 0.2s;
		}

		.footer a:hover {
			color: var(--accent-pastel);
		}
	</style>

	<script src="register-sw.js" defer></script>
	<script src="search.js" defer></script>
	<script src="index.js" defer></script>
</head>

<body>
	<div class="top-bar">
		<div class="nav-icons">
			<svg class="icon" viewBox="0 0 24 24">
				<line x1="19" y1="12" x2="5" y2="12"></line>
				<polyline points="12 19 5 12 12 5"></polyline>
			</svg>
			<svg class="icon" viewBox="0 0 24 24">
				<line x1="5" y1="12" x2="19" y2="12"></line>
				<polyline points="12 5 19 12 12 19"></polyline>
			</svg>
			<svg class="icon" viewBox="0 0 24 24">
				<polyline points="23 4 23 10 17 10"></polyline>
				<path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
			</svg>
		</div>

		<form id="top-form">
			<svg class="search-icon-inside" viewBox="0 0 24 24">
				<circle cx="11" cy="11" r="8"></circle>
				<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
			</svg>
			<input id="top-address" type="text" placeholder="Search the web freely" autocomplete="off" />
            </form>

			<div class="right-icons">
				<svg class="icon" viewBox="0 0 24 24">
					<rect x="2" y="6" width="20" height="12" rx="2" ry="2"></rect>
					<path d="M6 12h4"></path>
					<path d="M8 10v4"></path>
					<line x1="15" y1="13" x2="15.01" y2="13"></line>
					<line x1="18" y1="11" x2="18.01" y2="11"></line>
				</svg>
				<svg class="icon" viewBox="0 0 24 24">
					<rect x="3" y="11" width="18" height="10" rx="2"></rect>
					<circle cx="12" cy="5" r="2"></circle>
					<path d="M12 7v4"></path>
					<line x1="8" y1="16" x2="8.01" y2="16"></line>
					<line x1="16" y1="16" x2="16.01" y2="16"></line>
				</svg>
				<svg class="icon" viewBox="0 0 24 24">
					<circle cx="12" cy="12" r="3"></circle>
					<path
						d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
					</path>
				</svg>
				<svg class="icon" viewBox="0 0 24 24">
					<circle cx="12" cy="12" r="1"></circle>
					<circle cx="12" cy="5" r="1"></circle>
					<circle cx="12" cy="19" r="1"></circle>
				</svg>
			</div>
	</div>

	<div class="wrapper">
		<div class="center">
			<h1>Lunaris</h1>
			<p class="subtitle">Now with Geforce Now support!</p>
			<form id="sj-form">
				<input
                        id="sj-search-engine"
                        value="https://duckduckgo.com/?q=%s"
                        type="hidden"
                    />
				<input id="sj-address" type="text" placeholder="Search the world wide web" autocomplete="off" />
                </form>
		</div>
	</div>

	<div class="desc left-margin">
		<p id="sj-error"></p>
		<pre id="sj-error-code"></pre>
	</div>

	<div class="footer">
		<a href="/">main page</a>
		<a href="credits.html">credits</a>
		<a href="settings.html">settings</a>
	</div>

	<script>
		if (!localStorage.getItem("wispUrl")) {
                localStorage.setItem("wispUrl", "wss://gointospace.app/wisp/");
            }

            const transport = localStorage.getItem("transport");
            if (transport !== "epoxy" && transport !== "libcurl") {
                localStorage.setItem("transport", "libcurl");
            }

            // Sync top bar search
            document.getElementById("top-form").addEventListener("submit", function(e) {
                e.preventDefault();
                const topInput = document.getElementById("top-address").value;
                const mainInput = document.getElementById("sj-address");
                
                mainInput.value = topInput;
                
                document.getElementById("sj-form").dispatchEvent(new Event("submit", {
                    cancelable: true,
                    bubbles: true
                }));
            });
	</script>
</body>

</html>
