<canvas id="unity-canvas"></canvas>
<div id="fps-graph" style="display:none"><canvas id="fps-canvas" width="180" height="50"></canvas></div>

<script>
// =================== CONSOLE LOG DUMPER ===================
(function () {
    const original = { log: console.log, warn: console.warn, error: console.error };
    let LOG_BUFFER = [];

    function add(type, args){
        const msg = `[${new Date().toISOString()}] ${type}: ` +
            args.map(a => typeof a==="object"?JSON.stringify(a):String(a)).join(" ");
        LOG_BUFFER.push(msg);
        if(LOG_BUFFER.length>5000) LOG_BUFFER.shift();
    }

    console.log = (...a)=>{add("LOG",a); original.log(...a);};
    console.warn = (...a)=>{add("WARN",a); original.warn(...a);};
    console.error = (...a)=>{add("ERROR",a); original.error(...a);};

    window.__dumpConsoleLog = function(){
        const blob = new Blob([LOG_BUFFER.join("\n")], {type:"text/plain"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href=url; a.download="console_dump.txt";
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };
})();

// =================== GLOBAL ERROR POPUPS ===================
(function(){
    function showPopup(msg){
        console.error(msg);
        const d = document.createElement("div");
        d.style = `
            position:fixed;
            top:20px;
            left:50%;
            transform:translateX(-50%);
            background:#000;
            color:#ff3333;
            border:2px solid #ff0000;
            padding:12px 16px;
            font:13px monospace;
            z-index:9999999;
            border-radius:6px;
            max-width:95%;
            white-space:pre-wrap;
        `;
        d.textContent = msg;
        document.body.appendChild(d);
        setTimeout(()=>d.remove(),10000);
    }

    window.addEventListener("error", e=>{
        if(e.target && (e.target.src || e.target.href)){
            const url = e.target.src||e.target.href;
            showPopup("RESOURCE LOAD ERROR:\n" + url);
        } else {
            showPopup("JS ERROR:\n" + e.message + "\n" + e.filename + ":" + e.lineno);
        }
    }, true);

    window.addEventListener("unhandledrejection", e=>{
        showPopup("PROMISE ERROR:\n"+(e.reason?.stack||e.reason));
    });

    const _fetch = window.fetch;
    window.fetch = async (...args)=>{
        const res = await _fetch(...args);
        if(!res.ok){
            showPopup(`FETCH ERROR ${res.status}\n${args[0]}`);
        }
        return res;
    };
})();

window.Module = { print: console.log, printErr: console.error };

const lt=document.getElementById("loading-text"),
cv=document.getElementById("unity-canvas"),
mw=document.getElementById("unity-mobile-warning"),
fg=document.getElementById("fps-graph"),
fc=document.getElementById("fps-canvas");

let lb=0,hd=false,tm_id;
const tm='912.81',fh=[],ml=90;
fc.width=180; fc.height=50;
const ctx=fc.getContext('2d');
let lft=performance.now(),fr=0,fps=60,sb;

function uf(){
    const nt=performance.now(), dt=(nt-lft)/1000;
    lft=nt; fps=dt>0?1/dt:60; fr++;
    if(fr%3===0){
        fh.push(fps); if(fh.length>ml) fh.shift();
        ctx.clearRect(0,0,180,50);
        for(let i=0;i<fh.length;i++){
            const f=fh[i], h=Math.min(f/60,1)*35, c=f>50?'#0f0':f>30?'#fa0':'#f33';
            ctx.fillStyle=c; ctx.fillRect(i*2,50-h,1.8,h);
        }
        ctx.fillStyle='#fff'; ctx.font='bold 13px monospace';
        ctx.shadowColor='#000'; ctx.shadowBlur=4;
        ctx.fillText(Math.round(fps)+' FPS',6,16);
        ctx.shadowBlur=0;
    }
    requestAnimationFrame(uf);
}

function shw(){hd=false;fg.classList.remove('hidden');if(sb)sb.classList.remove('hidden')}
function rst(){clearTimeout(tm_id);if(!hd){hd=true;fg.classList.add('hidden');if(sb)sb.classList.add('hidden')}tm_id=setTimeout(shw,5000)}
document.addEventListener('keydown',rst);

// =================== UNITY LOAD ===================
function gp(f,s,e){return Array.from({length:e-s+1},(_,i)=>`${f}.part${s+i}`)}

async function fwp(u){
    const r = await fetch(u), rd = r.body.getReader(), ch=[];
    while(true){
        const {done,value}=await rd.read();
        if(done) break;
        lb+=value.length; ch.push(value);
        lt.textContent=`${(lb/1048576).toFixed(2)} MB / ${tm} MB`;
    }
    return URL.createObjectURL(new Blob(ch));
}

async function mf(p){
    const b=await Promise.all(p.map(fwp)),
    bl=await Promise.all(b.map(u=>fetch(u).then(r=>r.blob())));
    return URL.createObjectURL(new Blob(bl));
}

(async()=>{
    const [du,wu]=await Promise.all([
        mf(gp("Build/hktruffled.data",1,45)),
        mf(gp("Build/hktruffled.wasm",1,2))
    ]);
    const sc=document.createElement("script");
    sc.src="Build/hktruffled.loader.js";
    sc.onload=()=>{
        createUnityInstance(cv,{
            dataUrl:du,
            frameworkUrl:"Build/hktruffled.framework.js",
            codeUrl:wu,
            streamingAssetsUrl:"StreamingAssets",
            companyName:"Team Cherry",
            productName:"Hollow Knight",
            productVersion:"1.0"
        }).then(()=>{
            lt.remove();
            createButtons();
            fg.style.display='block';
            uf();
        }).catch(e=>alert("UNITY LOAD ERROR: "+e));
    };
    document.body.appendChild(sc);
})();

// =================== BUTTONS ===================
function createButtons(){
    addImportRealButton();
    addDumpButton();
    addUploadButton();
    addDownloadButton();
}

function baseBtn(right,text,onclick){
    const b=document.createElement('button');
    b.className='savebtn';
    b.style.right=right;
    b.textContent=text;
    b.onclick=onclick;
    document.body.appendChild(b);
}

// Download
function addDownloadButton(){
    baseBtn('12px','download',sdl);
}

// Upload JSON Export
function addUploadButton(){
    baseBtn('110px','upload',()=>document.getElementById('datInput').click());
    const fi=document.createElement('input');
    fi.type='file'; fi.id='datInput'; fi.accept='.dat'; fi.style.display='none';
    fi.onchange=idl;
    document.body.appendChild(fi);
}

// Dump Console
function addDumpButton(){
    baseBtn('220px','dump log',()=>window.__dumpConsoleLog());
}

// Import Real IDBFS
function addImportRealButton(){
    baseBtn('330px','Import Real',importRealSave);
}

function importRealSave(){
(() => {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "*/*";

  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;

    const buffer = await file.arrayBuffer();
    const bytes = new Uint8Array(buffer);

    const openReq = indexedDB.open("/idbfs");
    openReq.onsuccess = e => {
      const db = e.target.result;
      const tx = db.transaction("FILE_DATA", "readwrite");
      const store = tx.objectStore("FILE_DATA");

      store.getAllKeys().onsuccess = ev => {
        const keys = ev.target.result;
        if (!keys.length) {
          console.error("No keys found in FILE_DATA");
          return;
        }

        const firstKey = keys[0];
        const currentHash = firstKey.split("/")[2];

        const key = `/idbfs/${currentHash}/user1.dat`;

        const value = {
          timestamp: new Date().toISOString(),
          mode: 33206,
          contents: bytes
        };

        store.put(value, key).onsuccess = () => {
          alert("Real save imported. Refresh page.");
        };
      };
    };
  };

  input.click();
})();
}

// =================== EXPORT / IMPORT JSON SAVE ===================
async function sdl(){
    const dbs=await indexedDB.databases();
    let sv={},fd=false;
    for(const inf of dbs){
        const db=await new Promise((ok,bd)=>{
            const r=indexedDB.open(inf.name);
            r.onsuccess=()=>ok(r.result);
            r.onerror=()=>bd(r.error);
        });
        for(const st of db.objectStoreNames){
            try{
                const tx=db.transaction(st,'readonly');
                const store=tx.objectStore(st);
                const dt=await new Promise(res=>{store.getAll().onsuccess=e=>res(e.target.result)});
                if(dt.length){
                    sv[`${inf.name}/${st}`]=dt;
                    fd=true;
                }
            }catch{}
        }
        db.close();
    }
    if(!fd){alert('No save found');return;}
    const bl=new Blob([JSON.stringify(sv)],{type:'application/octet-stream'});
    const u=URL.createObjectURL(bl);
    const a=document.createElement('a');
    a.href=u; a.download='hk_save.dat';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(u);
}

async function idl(e){
    const f=e.target.files[0]; if(!f) return;
    const txt=await f.text();
    let data;
    try{data=JSON.parse(txt);}catch{alert("Invalid .dat file"); return;}
    const dbs = await indexedDB.databases();
    for(const key in data){
        const [,storeName] = key.split('/');
        for(const inf of dbs){
            const db = await new Promise((ok,bd)=>{
                const r=indexedDB.open(inf.name);
                r.onsuccess=()=>ok(r.result);
                r.onerror=()=>bd(r.error);
            });
            if(!db.objectStoreNames.contains(storeName)){ db.close(); continue; }
            const tx=db.transaction(storeName,"readwrite");
            const store=tx.objectStore(storeName);
            for(const item of data[key]){
                store.put(item);
            }
            await new Promise(r=>tx.oncomplete=r);
            db.close();
        }
    }
    alert("Save imported. Reload page.");
}
</script>
