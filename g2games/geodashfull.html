<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Web Dashers</title>

	<!-- ✅ Base CDN path (this makes ALL relative paths load from GitHub CDN) -->
	<base href="https://cdn.jsdelivr.net/gh/web-dashers/web-dashers.github.io@main/">

	<!-- Favicon -->
	<link rel="icon" type="image/x-icon" href="assets/favicon.ico">

	<!-- Styles -->
	<link rel="stylesheet" href="assets/style.css">

	<!-- - Embeds - -->
	<!-- Open Graph -->
    <meta property="og:title" content="Web Dash"/>
    <meta property="og:description" content="A mod of geometrydash.com!"/>
    <meta property="og:image" content="https://web-dashers.github.io/assets/logo.png"/>
    <meta property="og:url" content="https://web-dashers.github.io/"/>
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="Web Dash"/>
    <meta name="twitter:description" content="A mod of geometrydash.com!"/>
    <meta name="twitter:image" content="https://web-dashers.github.io/assets/logo.png"/>

	<!-- Libraries and core files -->
	<script src="assets/scripts/game/allObjects.js"></script>
	<script src="assets/scripts/game/allLevels.js"></script>
	<script src="assets/scripts/libs/phaser.min.js"></script>
	<script src="assets/scripts/libs/pako.min.js"></script>
	<script src="assets/scripts/utils/cache-manager.js"></script>
	<script src="assets/scripts/api/GDapiWrapper.js"></script>

	<!-- Worker config -->
	<script>
		window._gdProxyUrl = "https://gd-proxy.gmdc.workers.dev";
	</script>

	<!-- Deferred core scripts (better performance) -->
	<script defer src="assets/scripts/utils/config.js"></script>
	<script defer src="assets/scripts/core/triggers.js"></script>
	<script defer src="assets/scripts/core/level.js"></script>
	<script defer src="assets/scripts/core/player.js"></script>
	<script defer src="assets/scripts/core/audio.js"></script>
	<script defer src="assets/scripts/core/loading-screen.js"></script>
	<script defer src="assets/scripts/core/game-scene.js"></script>
	<script defer src="assets/scripts/core/main.js"></script>

	<!-- Resize + right-click disable -->
	<script>
		new ResizeObserver(() => {
			window.dispatchEvent(new Event('resize'));
		}).observe(document.documentElement);

		document.oncontextmenu = (event) => {
			event.preventDefault();
		};
	</script>
</head>

<body>
</body>
</html>
