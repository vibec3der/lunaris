<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Lunaris | Apps</title>
		<link rel="stylesheet" href="page.css" />
		<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
		<script src="page.js" defer></script>
	</head>
	<body>
		<main class="page">
			<section class="page-heading">
				<h1>Apps</h1>
			</section>

			<section class="grid" aria-label="App shortcuts">
				<button class="tile" type="button" data-open="https://youtube.com/">
					<i data-lucide="youtube"></i>
					<span>YouTube</span>
				</button>
				<button class="tile" type="button" data-open="https://discord.com/app">
					<i data-lucide="messages-square"></i>
					<span>Discord</span>
				</button>
				<button class="tile" type="button" data-open="https://open.spotify.com/">
					<i data-lucide="music-2"></i>
					<span>Spotify</span>
				</button>
				<button class="tile" type="button" data-open="https://docs.google.com/">
					<i data-lucide="file-text"></i>
					<span>Docs</span>
				</button>
			</section>
		</main>
	</body>
</html>
