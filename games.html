<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Lunaris | Games</title>
		<link rel="stylesheet" href="page.css" />
		<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
		<script src="page.js" defer></script>
	</head>
	<body>
		<main class="page">
			<section class="page-heading">
				<h1>Games</h1>
			</section>

			<section class="grid" aria-label="Game shortcuts">
				<button class="tile" type="button" data-open="https://play.geforcenow.com/">
					<i data-lucide="cloud"></i>
					<span>GeForce NOW</span>
				</button>
				<button class="tile" type="button" data-open="https://www.xbox.com/en-us/play">
					<i data-lucide="gamepad-2"></i>
					<span>Xbox Cloud</span>
				</button>
				<button class="tile" type="button" data-open="https://www.coolmathgames.com/">
					<i data-lucide="sparkles"></i>
					<span>Coolmath</span>
				</button>
				<button class="tile" type="button" data-open="https://now.gg/">
					<i data-lucide="monitor-up"></i>
					<span>now.gg</span>
				</button>
			</section>
		</main>
	</body>
</html>
