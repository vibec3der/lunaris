<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Lunaris | Games</title>

		<style>
			body {
				margin: 0;
				font-family: system-ui, sans-serif;
				background: #0b0b0b;
				color: white;
			}

			.page {
				padding: 20px;
			}

			.page-heading h1 {
				margin: 0 0 20px 0;
			}

			.grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
				gap: 12px;
			}

			.tile {
				border: none;
				background: #161616;
				border-radius: 12px;
				padding: 10px;
				cursor: pointer;
				color: white;
				text-align: left;
				transition: 0.15s;
			}

			.tile:hover {
				transform: scale(1.02);
				background: #222;
			}

			.tile img {
				width: 100%;
				height: 100px;
				object-fit: cover;
				border-radius: 8px;
				display: block;
				margin-bottom: 8px;
				background: #111;
			}

			.tile span {
				display: block;
				font-size: 14px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			/* OVERLAY */
			#overlay {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.95);
				display: none;
				z-index: 9999;
			}

			/* FULLSCREEN IFRAME */
			#frame {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				border: none;
				background: black;
			}

			/* FLOATING CLOSE BUTTON */
			#close {
				position: absolute;
				top: 12px;
				right: 12px;
				width: 42px;
				height: 42px;
				border: none;
				border-radius: 10px;
				background: #ff3b3b;
				color: white;
				font-size: 18px;
				cursor: pointer;
				z-index: 10000;
			}
		</style>
	</head>

	<body>
		<main class="page">
			<section class="page-heading">
				<h1>Games</h1>
			</section>

			<section class="grid" id="grid"></section>
		</main>

		<!-- OVERLAY -->
		<div id="overlay">
			<button id="close">✕</button>
			<iframe id="frame" allowfullscreen></iframe>
		</div>

		<script>
			const grid = document.getElementById("grid");
			const overlay = document.getElementById("overlay");
			const frame = document.getElementById("frame");
			const closeBtn = document.getElementById("close");

			let cache = [];

			async function loadGames() {
				try {
					const res = await fetch("/ugs.json", { cache: "force-cache" });
					if (!res.ok) throw new Error(res.status);

					cache = await res.json();

					requestAnimationFrame(renderGames);
				} catch (err) {
					console.error(err);
					grid.innerHTML = "<p style='color:red'>Failed to load games</p>";
				}
			}

			function renderGames() {
				const frag = document.createDocumentFragment();

				for (let i = 0; i < cache.length; i++) {
					const g = cache[i];

					const btn = document.createElement("button");
					btn.className = "tile";

					const title = g.title ?? "Untitled";
					const img = g.image ?? "";

					btn.innerHTML = `
						<img src="${img}" loading="lazy" decoding="async" />
						<span>${title}</span>
					`;

					btn.onclick = () => openGame(g.url);

					frag.appendChild(btn);
				}

				grid.appendChild(frag);
			}

			function openGame(url) {
				frame.src = url;
				overlay.style.display = "block";
			}

			function closeGame() {
				frame.src = "";
				overlay.style.display = "none";
			}

			closeBtn.onclick = closeGame;

			loadGames();
		</script>
	</body>
</html>
