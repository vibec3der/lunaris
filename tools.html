<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Lunaris | Tools</title>
		<link rel="stylesheet" href="page.css" />
		<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
		<script src="page.js" defer></script>
	</head>
	<body>
		<main class="page">
			<section class="page-heading">
				<h1>Tools</h1>
			</section>

			<section class="grid" aria-label="Tool shortcuts">
				<button class="tile" type="button" data-open="tools/e2e.html">
					<i data-lucide="workflow"></i>
					<span>E2E</span>
				</button>
				<button class="tile" type="button" data-open="tools/webretro.html">
					<i data-lucide="gamepad"></i>
					<span>Webretro</span>
				</button>
				<button class="tile" type="button" data-open="tools/wifi-password-extractor.html">
					<i data-lucide="wifi"></i>
					<span>WiFi Password Extractor</span>
				</button>
			</section>
		</main>
	</body>
</html>
